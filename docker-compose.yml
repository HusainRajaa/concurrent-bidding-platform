version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nexbid-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nexbid_user
      POSTGRES_PASSWORD: nexbid_password
      POSTGRES_DB: nexbid_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexbid_user -d nexbid_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexbid-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: nexbid-web
    ports:
      - "8000:7860"
    environment:
      - DATABASE_URL=postgresql+asyncpg://nexbid_user:nexbid_password@postgres:5432/nexbid_db
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=nexbid_super_secret_signing_key_for_jwt_tokens_replace_in_prod
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USERNAME=
      - SMTP_PASSWORD=
      - SMTP_FROM=noreply@nexbid.com
      - GOOGLE_CLIENT_ID=
      - GOOGLE_CLIENT_SECRET=
      - GOOGLE_REDIRECT_URI=http://localhost:8000/auth/google/callback
      - RESEND_API_KEY=${RESEND_API_KEY}
      - BREVO_API_KEY=${BREVO_API_KEY}
      - BREVO_SENDER_EMAIL=${BREVO_SENDER_EMAIL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
  redis_data:
